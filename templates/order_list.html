{% extends 'base.html' %}

{% block content %}
<h2>My Orders</h2>
<div class="grid" style="margin-top: 2rem;">
    {% for order in orders %}
    <div class="card">
        <h3>Order #{{ order.id }}</h3>
        <p>Status: <span style="color: var(--accent); font-weight: bold;">{{ order.status }}</span></p>
        <p>Total: <span style="font-size: 1.2rem;">${{ order.total_price }}</span></p>
        <p style="font-size: 0.9rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; margin-top: 1rem;">Placed on: {{ order.created_at|date:"M d, Y H:i" }}</p>
    </div>
    {% empty %}
    <div style="grid-column: 1 / -1; padding: 2rem; text-align: center; background: var(--bg-dark-elem); border-radius: 1rem;">
        <p>You have no orders yet.</p>
        <a href="/" class="btn" style="margin-top: 1rem;">Browse Menu</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
